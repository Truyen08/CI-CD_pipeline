version: "3.9"

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fastapi_app

    # ✅ NEW: mount code để auto update
    volumes:
      - ../app:/app/app

    # ✅ NEW: bật reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 5000 --reload

    # ✅ NEW: mở port ra ngoài để debug
    ports:
      - "5000:5000"

    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx_proxy

    ports:
      - "80:80"

    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - web

    restart: always

services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile

    container_name: fastapi_app

    expose:
      - "5000"

    volumes:
      - ../app:/app/app

    restart: always

  nginx:
    image: nginx:latest

    container_name: nginx_proxy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro

    depends_on:
      - web

    restart: always

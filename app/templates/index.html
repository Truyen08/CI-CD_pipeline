<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Member Login</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0ba339;
        }

        .login-container {
            width: 350px;
            height: 650px;
            background: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 90px;
            position: relative;
        }

        .login-title {
            font-size: 38px;
            font-weight: 700;
            color: #333;
            margin-bottom: 50px;
        }

        .input-box {
            width: 290px;
            height: 50px;
            background: #e5e5e5;
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            margin-bottom: 18px;
        }

        .input-box i {
            color: #777;
            margin-right: 12px;
            font-size: 15px;
        }

        .input-box input {
            border: none;
            outline: none;
            background: transparent;
            width: 100%;
            font-size: 15px;
            color: #555;
        }

        .input-box input::placeholder {
            color: #999;
        }

        .login-btn {
            width: 290px;
            height: 52px;
            border: none;
            border-radius: 30px;
            background: #57c13a;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #49ad2f;
        }

        .forgot {
            margin-top: 18px;
            font-size: 14px;
            color: #777;
            text-decoration: none;
        }

        .forgot span {
            font-weight: 600;
            color: #555;
        }

        .create-account {
            position: absolute;
            bottom: 35px;
            text-decoration: none;
            color: #666;
            font-size: 15px;
            font-weight: 400;
        }

        .create-account span {
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <h1 class="login-title">hello NS077</h1>

        <p>CI/CD pipeline by ThanhTruyen</p>

        <div class="input-box">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" placeholder="Email">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Password">
        </div>

        <button class="login-btn">LOGIN</button>

        <a href="#" class="forgot">
            Forgot Username / <span>Password?</span>
        </a>

        <a href="#" class="create-account">
            Create your <span>Account</span> →
        </a>

    </div>

</body>

</html>
